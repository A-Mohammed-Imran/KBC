<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBC Quiz Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Kaun Banega Quiz</h1>
    <p class="subtitle">Simple Quiz Game Project</p>

    <div id="startScreen" class="card">
      <p>Test your knowledge with multiple choice questions.</p>
      <button id="startBtn">Start Quiz</button>
    </div>

    <div id="quizScreen" class="card hidden">
      <div class="info-bar">
        <span>Question: <span id="questionNumber">1</span>/<span id="totalQuestions">0</span></span>
        <span>Score: <span id="score">0</span></span>
        <span>Time: <span id="timer">30</span>s</span>
      </div>

      <h2 id="questionText">Question text will come here</h2>

      <div id="optionsContainer" class="options"></div>

      <p id="message" class="message"></p>

      <div class="button-row">
        <button id="lifelineBtn">Use 50-50</button>
        <button id="nextBtn" disabled>Next Question</button>
      </div>
    </div>

    <div id="resultScreen" class="card hidden">
      <h2>Quiz Completed</h2>
      <p>Your Final Score: <strong id="finalScore">0</strong></p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
